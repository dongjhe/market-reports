<div class="wrap">
  <h1>庫存分析</h1>
  <p>{{ intro }}</p>

  <div class="group">
    @for (group of reportGroups; track group.label) {
      <div class="section-card">
        <div class="badge">{{ group.label }}</div>

        @for (report of group.reports; track report.path) {
          <div class="card">
            <a [routerLink]="report.path">{{ report.date }}｜{{ report.title }}</a>
            <div class="meta">{{ report.summary }}</div>
          </div>
        }
      </div>
    }
  </div>

  <a class="back" routerLink="/" replaceUrl>← 返回市場報告首頁</a>
</div>
